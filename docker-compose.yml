version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sentiment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/sentiment
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      JWT_ALGORITHM: HS256
      API_CORS_ORIGINS: http://localhost:3000
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker-sentiment:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: [ "python", "scripts/worker_sentiment.py" ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/sentiment
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker-aggregates:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: [ "python", "scripts/worker_aggregates.py" ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/sentiment
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker-ingest-reddit:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: [ "python", "scripts/worker_ingest_reddit.py", "technology" ]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/sentiment
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.0.3
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  grafanadata:


